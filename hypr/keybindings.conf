$mainMod = SUPER # Sets "Windows" key as main modifier

# Basic Applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, B, exec, $browser
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, D, exec, $powermenu
bind = $mainMod SHIFT, W, exec, $wallpaper
bind = $mainMod SHIFT, S, exec, $screenshot
bind = $mainMod SHIFT, A, exec, $activate-linux
bind = $mainMod SHIFT, backslash, exec, hyprlock
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, R, exec, killall -9 waybar ; waybar &
bind = $mainMod, P, pseudo,

# System Controls
bind = , F10, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , F11, exec, pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , F12, exec, pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ +5%

# Brightness controls, change the commands after the exec depends on what workds for you
binde = , F8, exec, ddcutil setvcp 10 - 5 --sleep-multiplier .1
binde = , F9, exec, ddcutil setvcp 10 + 5 --sleep-multiplier .1

# Media Controls
bind = $mainMod SHIFT, period, exec, playerctl next
bind = $mainMod SHIFT, comma, exec, playerctl previous
bind = $mainMod SHIFT, space, exec, playerctl play-pause

# Vim-like Focus (h, j, k, l)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Vim-like Window Movement (Shift + h, j, k, l)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Arrow Key Focus/Movement
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d
bind = $mainMod, B, layoutmsg, togglesplit

# Workspaces (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Window Rules
# windowrule = float, tertime #
# windowrule = size 344 144, tertime #
# windowrule = move 10 10, tertime #

# Mouse Bindings
bindm = $mainMod, mouse:272, movewindow # [cite: 3]
bindm = $mainMod, mouse:273, resizewindow

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
