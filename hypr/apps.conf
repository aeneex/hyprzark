# Application Variable
$terminal      =    kitty
$fileManager   =    nautilus
$menu          =    rofi -show drun -theme "~/.config/rofi/appsearcher/config.rasi"
$browser       =    brave --profile-directory="Default"

# Essential Startup programs (Desktop Components)
exec-once = waybar &
exec-once = swww-daemon &
exec-once = nm-applet
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start pipewire wireplumber pipewire-pulse
exec-once = gnome-keyring-daemon --start --components=secrets

# Custom Programs or scripts
exec-once = ~/.scripts/connect-mic.sh
