# Application Variable
$terminal             =    kitty
$fileManager          =    nautilus
$menu                 =    rofi -show drun -theme "~/.config/rofi/appsearcher/config.rasi"
$wallpaper            =    bash ~/.config/rofi/wallsetter/wallsetter.sh
$powermenu            =    bash ~/.config/rofi/powermenu/powermenu.sh
$screenshot           =    grim -g "$(slurp)" - | wl-copy
$activate-linux       =    bash ~/.scripts/activate-linux.sh
$browser              =    brave --profile-directory="Default"

# Essential Startup programs (Desktop Components)
exec-once = waybar &
exec-once = awww-daemon &
exec-once = nm-applet
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start pipewire wireplumber pipewire-pulse

# Custom Programs or scripts
exec-once = ~/.scripts/connect-mic.sh
