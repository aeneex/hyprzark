# Background
background {
    monitor = HDMI-A-2
    path = screenshot
    blur_passes = 4
    blur_size = 7
    contrast = 0.85
    brightness = 0.75
    vibrancy = 0.08
    vibrancy_darkness = 0.0
}

# General
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# Time
label {
    monitor = HDMI-A-2
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(230, 230, 230, 0.88)
    font_size = 100
    font_family = SF Pro Display, SF UI Text
    position = 0, 320
    halign = center
    valign = center
}

# Date
label {
    monitor = HDMI-A-2
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgba(180, 180, 180, 0.60)
    font_size = 16
    font_family = SF Pro Text, SF UI Text
    position = 0, 235
    halign = center
    valign = center
}

# Profile Photo
image {
    monitor = HDMI-A-2
    path = /home/ixubux/.config/hypr/hyprlock/ixubux.png
    border_color = rgba(200, 200, 200, 0.18)
    border_size = 1
    size = 72
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0, -260
    halign = center
    valign = center
}

# User Gretting
label {
    monitor = HDMI-A-2
    text = $USER
    color = rgba(200, 200, 200, 0.75)
    font_size = 13
    font_family = SF Pro Text, SF UI Text
    position = 0, -315
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor = HDMI-A-2
    size = 220, 42
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.08)
    inner_color = rgba(255, 255, 255, 0.06)
    font_color = rgba(220, 220, 220, 0.90)
    check_color = rgba(200, 200, 200, 0.80)
    fail_color = rgba(180, 100, 100, 0.80)
    fade_on_empty = true
    font_family = SF Pro Text, SF UI Text
    placeholder_text = <span foreground="##ffffff44" style="italic">Password</span>
    hide_input = false
    rounding = 12
    position = 0, -372
    halign = center
    valign = center
}

# Current Song
label {
    monitor = HDMI-A-2
    text = cmd[update:1000] echo "$(~/.config/hypr/hyprlock/songdetail.sh)"
    color = rgba(160, 160, 160, 0.55)
    font_size = 11
    font_family = SF Pro Text, SF UI Text
    position = 0, 36
    halign = center
    valign = bottom
}
